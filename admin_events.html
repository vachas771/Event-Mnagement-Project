<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin | Manage Events</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container">

    <h2>Manage Events</h2>

    <a href="/admin/add-event" class="add-btn">➕ Add New Event</a>

    <table>
        <tr>
            <th>Title</th>
            <th>Date</th>
            <th>Venue</th>
            <th>Price</th>
            <th>Actions</th>
        </tr>

        {% for e in events %}
        <tr>
            <td>{{ e[1] }}</td>
            <td>{{ e[3] }}</td>
            <td>{{ e[4] }}</td>
            <td>₹{{ e[5] }}</td>
            <td class="action-links">
                <a href="/admin/edit-event/{{ e[0] }}">Edit</a> |
                <a href="/admin/delete-event/{{ e[0] }}"
                   class="delete-link"
                   onclick="return confirm('Are you sure you want to delete this event?')">
                    Delete
                </a>
            </td>
        </tr>
        {% else %}
        <tr>
            <td colspan="5">No events found.</td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
